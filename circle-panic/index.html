<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kreis-Klick</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game">
    <header class="game__header">
      <div>
        <p class="eyebrow">Reaktionsspiel</p>
        <h1>Kreis-Klick</h1>
      </div>

      <div class="stats" aria-label="Spielstand">
        <div class="stat">
          <span>Level</span>
          <strong id="level">1</strong>
        </div>
        <div class="stat">
          <span>Geklickt</span>
          <strong id="clicked">0</strong>
        </div>
        <div class="stat">
          <span>Verbleibend</span>
          <strong id="remaining">30</strong>
        </div>
        <div class="stat">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span>Highscore</span>
          <strong id="highScore">0</strong>
        </div>
      </div>
    </header>

    <section id="playfield" class="playfield" aria-label="Spielfeld">
      <div id="overlay" class="overlay">
        <p id="message">Klicke alle Kreise an, bevor sie zu groß werden.</p>
        <label id="levelPicker" class="level-picker" for="startLevel">
          Startlevel
          <select id="startLevel"></select>
        </label>
        <button id="startButton" type="button">Spiel starten</button>
        <button id="restartButton" class="is-hidden" type="button">Neu starten</button>
      </div>
    </section>

    <p class="hint">Pro Level: 30 Kreise. Ab Level 3 kommt Bewegung ins Spiel.</p>
  </main>

  <script src="game.js"></script>
</body>
</html>
